server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 50m;
    include /etc/nginx/mime.types;

    # Static assets: serve directly, 404 if not found
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|map|webp|avif)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # User guide
    location = /guide {
        alias /usr/share/nginx/html/docs/guide.html;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
        # Allow iframe embedding from CoreAgents
        add_header Content-Security-Policy "frame-ancestors 'self' https://core-agents.mf4g.studio https://mf4g.studio https://*.mf4g.studio http://localhost:*" always;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}
